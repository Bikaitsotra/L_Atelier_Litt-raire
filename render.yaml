# =========================================================================
# Render Blueprint Specification for "L'Atelier Littéraire"
# This file allows simple, automated setup of your web service on Render.
# =========================================================================

services:
  - type: web
    name: atelier-litteraire
    # We can utilize Render's native Node.js runtime for ultra-fast builds
    runtime: node
    plan: starter
    
    # Compilation & build system scripts configured from package.json
    buildCommand: npm install && npm run build
    startCommand: npm start

    # Network routing configuration
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000

      # Main API Key for the literary assistant (Gemini models)
      - key: GEMINI_API_KEY
        sync: false
        placeholder: "Entrez votre clé API Gemini de Google AI Studio"

      # Optional credentials for Google Auth (OAuth 2.0 Client)
      - key: GOOGLE_CLIENT_ID
        sync: false
        optional: true
      - key: GOOGLE_CLIENT_SECRET
        sync: false
        optional: true

    # OPTIONAL Persistent storage if you want local_store.json to remain intact
    # between automatic redeployments (only needed if NOT using Google Firebase Cloud Database).
    # To enable this, you must subscribe to a paid disk or use the default Firebase configuration.
    # disk:
    #   name: local-db-storage
    #   mountPath: /app/data
    #   sizeGB: 1
