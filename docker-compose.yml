version: "3.8"

services:
  atelier-litteraire:
    build:
      context: .
      dockerfile: Dockerfile
    image: atelier-litteraire:latest
    container_name: atelier-litteraire-app
    ports:
      - "3000:3000"
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=3000
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - APP_URL=${APP_URL:-http://localhost:3000}
    # Exemple d'utilisation de volumes pour injecter à la volée une configuration Firebase externe :
    # volumes:
    #   - ./firebase-applet-config.json:/app/firebase-applet-config.json:ro
